<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fundo romantico para casamento</title>
  <desc id="desc">Arte em tons claros com gradientes, luz suave e detalhes florais em dourado.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f3ed"/>
      <stop offset="45%" stop-color="#efe4d8"/>
      <stop offset="100%" stop-color="#f9f6f2"/>
    </linearGradient>
    <radialGradient id="light" cx="0.7" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8c09d"/>
      <stop offset="100%" stop-color="#c8ab81"/>
    </linearGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="1360" cy="220" rx="520" ry="260" fill="url(#light)"/>

